syntax = "proto3";
package kratos.api;

option go_package = "tradingbot/app/tradingbot/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Exchange exchange = 3;
  repeated Strategy strategies = 4;
}

message Exchange {
  message Hyperliquid {
    string api_url        = 1;
    string master_address = 2;
    string agent_key_env  = 3;
    bool   testnet        = 4;
  }
  Hyperliquid hyperliquid = 1;
}

message Strategy {
  string                   id                 = 1;
  string                   coin               = 2;
  string                   quote_amount       = 3;
  google.protobuf.Duration interval           = 4;
  int32                    ladder_size        = 5;
  repeated string          price_offsets_bps  = 6;
  string                   max_slippage_bps   = 7;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message Pubsub {
    string name = 1;
    string topic = 2;
  }
  Database database = 1;
  Redis redis = 2;
  Pubsub pubsub = 3;
}
