server:
  http:
    addr: 0.0.0.0:8000
    timeout: 200s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 200s
data:
  database:
    driver: postgres
    source: host=postgres port=5432 user=tradingbot password=tradingbot dbname=tradingbot sslmode=disable
  redis:
    addr: redis:6379
    read_timeout: 1s
    write_timeout: 1s
  pubsub:
    name: pubsub
    topic: trading.events
exchange:
  hyperliquid:
    api_url: https://api.hyperliquid-testnet.xyz
    master_address: "0xYOUR_MASTER_ADDRESS"
    agent_key_env: HL_AGENT_KEY
    testnet: true
strategies:
  - id: ubtc-weekly
    coin: UBTC/USDC
    quote_amount: "10"
    interval: 60s
    ladder_size: 4
    price_offsets_bps:
      - "-50"
      - "-100"
      - "-150"
      - "-200"
    max_slippage_bps: "300"
