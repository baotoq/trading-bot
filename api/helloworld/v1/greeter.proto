syntax = "proto3";

package helloworld.v1;

import "google/api/annotations.proto";

option go_package = "tradingbot/api/helloworld/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.helloworld.v1";
option java_outer_classname = "HelloworldProtoV1";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/helloworld/{name}"
    };
  }

  rpc CreateGreeter (CreateGreeterRequest) returns (CreateGreeterReply) {
    option (google.api.http) = {
      get: "/greeter/create/{hello}"
    };
  }

  rpc GetGreeter (GetGreeterRequest) returns (GetGreeterReply) {
    option (google.api.http) = {
      get: "/greeter/{id}"
    };
  }
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message CreateGreeterRequest {
  string hello = 1;
}

message CreateGreeterReply {
  int64 id = 1;
  string hello = 2;
}

message GetGreeterRequest {
  int64 id = 1;
}

message GetGreeterReply {
  int64 id = 1;
  string hello = 2;
}
