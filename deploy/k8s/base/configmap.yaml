apiVersion: v1
kind: ConfigMap
metadata:
  name: tradingbot-config
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 1s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 1s
    data:
      database:
        driver: postgres
        source: host=postgres port=5432 user=tradingbot password=tradingbot dbname=tradingbot sslmode=disable
      redis:
        addr: redis:6379
        read_timeout: 0.2s
        write_timeout: 0.2s
