apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tradingbot-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tradingbot-secret-reader
subjects:
  - kind: ServiceAccount
    name: default
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: tradingbot-secret-reader
