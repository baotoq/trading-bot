apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: trading-bot
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Local Postgres",
          "Group": "Servers",
          "Host": "postgres.trading-bot.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "tradingbot",
          "Username": "tradingbot",
          "PassFile": "/pgpass/pgpassfile",
          "SSLMode": "prefer"
        }
      }
    }
  pgpassfile: "postgres.trading-bot.svc.cluster.local:5432:*:tradingbot:tradingbot"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: trading-bot
  labels:
    app: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      securityContext:
        runAsUser: 5050
        runAsGroup: 5050
        fsGroup: 5050
      initContainers:
        - name: pgpass
          image: busybox:1.36
          command: ['sh', '-c', 'cp /config/pgpassfile /pgpass/pgpassfile && chmod 600 /pgpass/pgpassfile']
          volumeMounts:
            - name: config
              mountPath: /config
            - name: pgpass
              mountPath: /pgpass
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8.12
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: admin@local.dev
            - name: PGADMIN_DEFAULT_PASSWORD
              value: admin
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "False"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
            - name: PGADMIN_DISABLE_POSTFIX
              value: "True"
          volumeMounts:
            - name: config
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true
            - name: pgpass
              mountPath: /pgpass
            - name: data
              mountPath: /var/lib/pgadmin
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: pgadmin-config
        - name: pgpass
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: trading-bot
spec:
  selector:
    app: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: 80
